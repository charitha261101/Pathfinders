name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      timescaledb:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: pathwise_test
          POSTGRES_USER: pathwise
          POSTGRES_PASSWORD: pathwise_test
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install API Gateway dependencies
        run: pip install -r services/api-gateway/requirements.txt
        continue-on-error: true
      - name: Install test dependencies
        run: pip install pytest pytest-asyncio httpx
      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check services/ tests/ --ignore E501
        continue-on-error: true
      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short
        continue-on-error: true
        env:
          REDIS_URL: redis://localhost:6379
          DATABASE_URL: postgresql://pathwise:pathwise_test@localhost:5432/pathwise_test
      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short
        continue-on-error: true
        env:
          REDIS_URL: redis://localhost:6379
          DATABASE_URL: postgresql://pathwise:pathwise_test@localhost:5432/pathwise_test

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps
      - name: Lint
        working-directory: frontend
        run: npm run lint
        continue-on-error: true
      - name: Run tests
        working-directory: frontend
        run: npm test -- --watchAll=false
        continue-on-error: true
      - name: Build
        working-directory: frontend
        run: npm run build
        continue-on-error: true

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint-and-test, frontend-test]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: docker compose build
        continue-on-error: true