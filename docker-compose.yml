# docker-compose.yml

version: "3.9"

services:
  # --- Data Layer ---
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: pathwise
      POSTGRES_USER: pathwise
      POSTGRES_PASSWORD: pathwise_dev
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  # --- SDN Controllers ---
  opendaylight:
    image: opendaylight/odl:latest
    ports:
      - "6633:6633"   # OpenFlow
      - "8181:8181"   # RESTCONF
    environment:
      FEATURES: odl-restconf,odl-l2switch-switch,odl-openflowplugin-flow-services

  # --- Network Emulation ---
  mininet:
    build: ./infra/mininet
    privileged: true
    network_mode: host
    depends_on:
      - opendaylight

  batfish:
    image: batfish/allinone:latest
    ports:
      - "9997:9997"   # Batfish API
      - "9996:9996"   # Batfish coordinator

  # --- Application Services ---
  api-gateway:
    build: ./services/api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - timescaledb
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://pathwise:pathwise_dev@timescaledb:5432/pathwise

  telemetry-ingestion:
    build: ./services/telemetry-ingestion
    depends_on:
      - redis
      - timescaledb
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://pathwise:pathwise_dev@timescaledb:5432/pathwise

  prediction-engine:
    build: ./services/prediction-engine
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379
      MODEL_PATH: /models/best_model.pt
    volumes:
      - ./ml/checkpoints:/models

  traffic-steering:
    build: ./services/traffic-steering
    depends_on:
      - redis
      - opendaylight
    environment:
      REDIS_URL: redis://redis:6379
      ODL_URL: http://opendaylight:8181

  digital-twin:
    build: ./services/digital-twin
    privileged: true
    depends_on:
      - mininet
      - batfish
    environment:
      BATFISH_HOST: batfish

  # --- Frontend ---
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    environment:
      REACT_APP_API_URL: http://localhost:8000

volumes:
  timescale_data:
